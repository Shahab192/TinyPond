<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Submarine Train</title>
    <style>
        :root {
            --water: #00b4d8;
            --deep: #011627;
            --gold: #ffb703;
            --brass: #e09f3e;
            --punch: #ef476f;
            --ruby: #9b2226;
            --ui-bg: rgba(1, 22, 39, 0.95);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--deep);
            font-family: 'Trebuchet MS', sans-serif;
            user-select: none;
        }

        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; touch-action: none; background: linear-gradient(to bottom, #00b4d8, #0077b6, #023e8a); }

        /* Start Screen */
        #start-screen {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, #0077b6 0%, #011627 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; color: white; text-align: center;
        }

        .start-title {
            font-size: 3.5rem; color: var(--gold); text-shadow: 0 0 20px rgba(255,183,3,0.5);
            margin-bottom: 10px; font-weight: 900; letter-spacing: -2px;
        }

        .start-btn {
            background: var(--gold); color: #333; border: none; padding: 18px 45px;
            font-size: 1.5rem; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 0 #cc9200; transition: transform 0.1s;
        }
        .start-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #cc9200; }

        .hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 100;
        }

        .pill {
            background: var(--ui-bg); border: 2px solid var(--brass);
            padding: 8px 15px; border-radius: 20px; color: white;
            font-weight: bold; display: flex; align-items: center; gap: 8px;
            pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; pointer-events: auto; z-index: 100;
        }

        .btn-circle {
            width: 65px; height: 65px; background: var(--gold);
            border: 4px solid white; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 5px 0 #cc9200;
            font-size: 24px; transition: transform 0.1s;
        }
        .btn-circle:active { transform: translateY(3px); box-shadow: 0 2px 0 #cc9200; }
        .btn-circle span { font-size: 9px; font-weight: bold; color: #333; margin-top: 2px; }

        .modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1d3557; border: 4px solid var(--brass); width: 92%; max-width: 480px;
            padding: 20px; border-radius: 25px; display: none; flex-direction: column;
            pointer-events: auto; z-index: 1000; color: white;
        }

        /* Success Toast */
        #toast {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: #06d6a0; color: #011627; padding: 10px 25px; border-radius: 30px;
            font-weight: bold; font-size: 14px; opacity: 0; transition: opacity 0.3s;
            z-index: 3000; pointer-events: none; border: 2px solid white;
        }

        .scroll-list { max-height: 40vh; overflow-y: auto; margin: 15px 0; }
        .item-row {
            background: rgba(255,255,255,0.1); border-radius: 12px; padding: 12px;
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }

        .yard-section { margin-bottom: 15px; }
        .yard-label { font-size: 10px; font-weight: bold; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; opacity: 0.8; }

        .merge-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            background: rgba(0,0,0,0.2); padding: 12px; border-radius: 15px;
        }
        
        .slot {
            aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 10px;
            border: 2px dashed rgba(255,255,255,0.2); display: flex; align-items: center;
            justify-content: center; font-size: 24px; position: relative;
        }
        .slot.filled { background: rgba(255,255,255,0.1); border-style: solid; border-color: rgba(255,255,255,0.1); }
        .slot.selected { border-color: var(--gold); background: rgba(255, 183, 3, 0.35); box-shadow: 0 0 10px var(--gold); }
        
        .status-dot { position: absolute; top: 4px; right: 4px; width: 10px; height: 10px; border-radius: 50%; background: #333; border: 1px solid rgba(255,255,255,0.2); }
        .status-dot.on { background: #06d6a0; box-shadow: 0 0 8px #06d6a0; }

        .lvl-tag { position: absolute; bottom: 2px; left: 2px; font-size: 8px; background: var(--brass); color: black; padding: 1px 4px; border-radius: 3px; font-weight: bold; border: 1px solid rgba(0,0,0,0.2); }
        
        .controls-small { display: flex; gap: 5px; margin-top: 10px; }
        .btn-small { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: filter 0.2s; }
        .btn-small:active { filter: brightness(0.8); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="toast">UPDATED!</div>

    <div id="start-screen">
        <div class="start-title">SUBMARINE TRAIN</div>
        <div style="margin-bottom: 30px; opacity: 0.8; max-width: 80%;">Explore the depths. Collect passengers at Stations. Drop them off at Hubs for profit.</div>
        <button class="start-btn" onclick="startGame()">START MISSION</button>
        <div style="margin-top: 20px; font-size: 12px; color: var(--brass);">Fleet Management Active</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="hud">
        <div style="display:flex; gap:10px;">
            <div class="pill">💰 <span id="gold-val">0</span></div>
            <div class="pill">👥 <span id="pass-val">0</span></div>
        </div>
        <div class="pill">⚙️ <span id="train-len">0</span>/10</div>
    </div>

    <div class="controls">
        <div class="btn-circle" onclick="openShop()">🛒<span>SHOP</span></div>
        <div class="btn-circle" onclick="openMerge()">🏗️<span>YARD</span></div>
    </div>

    <div id="shop-modal" class="modal">
        <h2 style="text-align:center; margin:0; color:var(--gold); padding: 15px 0;">Fleet Market</h2>
        <div class="scroll-list" id="shop-list"></div>
        <button onclick="closeModals()" style="background:var(--punch); border:none; padding:12px; border-radius:10px; color:white; font-weight:bold; cursor:pointer; margin: 10px;">CLOSE</button>
    </div>

    <div id="merge-modal" class="modal">
        <h2 style="text-align:center; margin:0; color:var(--gold); padding: 15px 0;">Assembly Yard</h2>
        <p style="text-align: center; font-size: 11px; margin-top: -10px; opacity: 0.7;">Select two items of the same level to merge them!</p>
        <div class="scroll-list" style="max-height: 55vh; padding: 0 15px;">
            <div class="yard-section">
                <div class="yard-label">Engines</div>
                <div class="merge-grid" id="engine-grid"></div>
            </div>
            <div class="yard-section">
                <div class="yard-label">Cabooses</div>
                <div class="merge-grid" id="caboose-grid"></div>
            </div>
            <div class="yard-section">
                <div class="yard-label">Coaches</div>
                <div class="merge-grid" id="coach-grid" style="grid-template-columns: repeat(5, 1fr);"></div>
            </div>
        </div>
        <div id="yard-controls" style="display:none; padding: 0 15px;">
            <div class="controls-small">
                <button id="toggle-btn" class="btn-small" style="background:var(--gold); color:black;" onclick="toggleEquip()">EQUIP / UNEQUIP</button>
                <button class="btn-small" style="background:var(--punch); color:white;" onclick="scrapItem()">SCRAP</button>
            </div>
        </div>
        <button onclick="closeModals()" style="background:var(--brass); border:none; padding:12px; border-radius:10px; color:black; font-weight:bold; margin: 15px; cursor:pointer;">EXIT YARD</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const FLAT_PRICE = 500;
    const MAX_ACTIVE_COACHES = 10;
    const SHOP_DATA = [
        { id: 'm_coach_standard', name: "Wooden Coach", price: FLAT_PRICE, icon: '🚃', desc: "Holds 6+ people", color: '#0077b6' },
        { id: 'm_coach_ruby', name: "Ruby Coach", price: 1200, icon: '🔻', desc: "Wealthy passengers", color: '#9b2226' },
        { id: 'm_coach_vend', name: "Vending Car", price: 2000, icon: '🥤', desc: "Passive gold gen", color: '#06d6a0' },
        { id: 'm_sub_steam', name: "Steam Engine", price: 2500, icon: '🚂', desc: "Basic power", color: '#9e2a2b' },
        { id: 'm_sub_bullet', name: "Steel Engine", price: 6000, icon: '🚄', desc: "High velocity!", color: '#4a4e69' },
        { id: 'm_tail_basic', name: "Brake Van", price: FLAT_PRICE, icon: '🏠', desc: "End car", color: '#e09f3e' }
    ];

    // MONEY RESET FOR DEPLOYMENT
    let gold = 0; 
    let worldX = 0;
    let trainY = 0, targetY = 0;
    let state = 'START';
    let w, h;

    // Initial Inventory
    let inventory = [
        { id: Math.random(), type: 'sub', subType: 'steam', lvl: 1, icon: '🚂', color: '#9e2a2b', equipped: true },
        { id: Math.random(), type: 'coach', subType: 'standard', lvl: 1, icon: '🚃', color: '#0077b6', equipped: true },
        { id: Math.random(), type: 'tail', subType: 'basic', lvl: 1, icon: '🏠', color: '#e09f3e', equipped: true }
    ];
    let selectedId = null;

    let activeEngine = null;
    let activeTail = null;
    let activeCoaches = [];

    let stations = [];
    let bubbles = Array.from({length: 40}, () => ({ x: Math.random()*2000, y: Math.random()*1000, r: Math.random()*3+1, s: Math.random()*2+1 }));
    let floatingTexts = [];

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 1500);
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        state = 'PLAY';
    }

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        if(trainY === 0) trainY = targetY = h / 2;
    }

    function updateUI() {
        document.getElementById('gold-val').innerText = Math.floor(gold);
        const passSum = activeCoaches.reduce((a,b) => a + (b.pass||0), 0);
        document.getElementById('pass-val').innerText = passSum;
        document.getElementById('train-len').innerText = activeCoaches.length;
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        state = 'PLAY';
    }

    function openShop() {
        state = 'PAUSE';
        const list = document.getElementById('shop-list');
        list.innerHTML = '';
        SHOP_DATA.forEach(item => {
            const canAfford = gold >= item.price;
            list.innerHTML += `
                <div class="item-row">
                    <div style="display:flex; gap:10px; align-items:center;">
                        <span style="font-size:24px;">${item.icon}</span>
                        <div style="color:white;"><b>${item.name}</b><br><small style="opacity:0.7">${item.desc}</small></div>
                    </div>
                    <button onclick="buyItem('${item.id}', ${item.price})" 
                            style="background:${canAfford?'var(--gold)':'#555'}; border:none; padding:8px 12px; border-radius:8px; font-weight:bold; cursor:pointer;"
                            ${!canAfford?'disabled':''}>💰${item.price}</button>
                </div>
            `;
        });
        document.getElementById('shop-modal').style.display = 'flex';
    }

    function buyItem(id, price) {
        if (gold < price) return;
        gold -= price;
        const base = SHOP_DATA.find(i => i.id === id);
        const parts = id.split('_');
        inventory.push({ 
            id: Math.random(),
            type: parts[1], 
            subType: parts[2], 
            lvl: 1, 
            icon: base.icon, 
            color: base.color,
            equipped: false 
        });
        showToast("PURCHASED!");
        updateUI();
        openShop();
    }

    function openMerge() {
        state = 'PAUSE';
        selectedId = null;
        renderYard();
        document.getElementById('merge-modal').style.display = 'flex';
    }

    function renderYard() {
        const engineGrid = document.getElementById('engine-grid');
        const cabooseGrid = document.getElementById('caboose-grid');
        const coachGrid = document.getElementById('coach-grid');

        const engines = inventory.filter(i => i.type === 'sub');
        const cabooses = inventory.filter(i => i.type === 'tail');
        const coaches = inventory.filter(i => i.type === 'coach');

        const drawGrid = (el, items, slots) => {
            el.innerHTML = '';
            const total = Math.max(items.length, slots);
            for (let i = 0; i < total; i++) {
                const item = items[i];
                const isSelected = item && selectedId === item.id;
                el.innerHTML += `
                    <div class="slot ${item ? 'filled' : ''} ${isSelected ? 'selected' : ''}" 
                         onclick="handleYardClick('${item ? item.id : 'none'}')">
                        ${item ? item.icon : ''}
                        ${item ? `<span class="lvl-tag">L${item.lvl}</span>` : ''}
                        ${item ? `<div class="status-dot ${item.equipped ? 'on' : ''}"></div>` : ''}
                    </div>
                `;
            }
        };

        drawGrid(engineGrid, engines, 5);
        drawGrid(cabooseGrid, cabooses, 5);
        drawGrid(coachGrid, coaches, 10);

        document.getElementById('yard-controls').style.display = selectedId !== null ? 'block' : 'none';
        const item = inventory.find(i => i.id === selectedId);
        if (item) {
            document.getElementById('toggle-btn').innerText = item.equipped ? "UNEQUIP" : "EQUIP";
        }
    }

    function handleYardClick(idString) {
        if (idString === 'none') {
            selectedId = null;
            renderYard();
            return;
        }

        const idNum = parseFloat(idString);

        if (selectedId === null) {
            selectedId = idNum;
        } else if (selectedId === idNum) {
            selectedId = null;
        } else {
            const aIdx = inventory.findIndex(i => i.id === selectedId);
            const bIdx = inventory.findIndex(i => i.id === idNum);
            
            if (aIdx === -1 || bIdx === -1) {
                 selectedId = idNum;
                 renderYard();
                 return;
            }

            const a = inventory[aIdx];
            const b = inventory[bIdx];

            // MERGE ATTEMPT
            if (a.type === b.type && a.subType === b.subType && a.lvl === b.lvl) {
                const shouldBeEquipped = a.equipped || b.equipped;
                
                inventory[bIdx].lvl++;
                inventory[bIdx].equipped = shouldBeEquipped;
                inventory.splice(aIdx, 1);
                
                selectedId = null;
                showToast("MERGED! LEVEL UP!");
                rebuildTrain();
            } else {
                selectedId = idNum;
            }
        }
        renderYard();
    }

    function toggleEquip() {
        if (selectedId === null) return;
        const item = inventory.find(i => i.id === selectedId);
        if (!item) return;
        
        if (item.equipped) {
            const activeEngines = inventory.filter(i => i.type === 'sub' && i.equipped);
            const activeTails = inventory.filter(i => i.type === 'tail' && i.equipped);
            if (item.type === 'sub' && activeEngines.length <= 1) {
                showToast("NEED AT LEAST 1 ENGINE!");
                return;
            }
            if (item.type === 'tail' && activeTails.length <= 1) {
                showToast("NEED AT LEAST 1 CABOOSE!");
                return;
            }
            item.equipped = false;
            showToast("UNEQUIPPED");
        } else {
            if (item.type === 'sub') {
                inventory.filter(i => i.type === 'sub').forEach(i => i.equipped = false);
                item.equipped = true;
                showToast("ENGINE EQUIPPED");
            } else if (item.type === 'tail') {
                inventory.filter(i => i.type === 'tail').forEach(i => i.equipped = false);
                item.equipped = true;
                showToast("CABOOSE EQUIPPED");
            } else if (item.type === 'coach') {
                const activeCoachesCount = inventory.filter(i => i.type === 'coach' && i.equipped).length;
                if (activeCoachesCount < MAX_ACTIVE_COACHES) {
                    item.equipped = true;
                    showToast("COACH EQUIPPED");
                } else {
                    showToast("TRAIN IS FULL! (MAX 10)");
                }
            }
        }
        rebuildTrain();
        renderYard();
    }

    function scrapItem() {
        if (selectedId === null) return;
        const idx = inventory.findIndex(i => i.id === selectedId);
        const item = inventory[idx];
        const activeEngines = inventory.filter(i => i.type === 'sub' && i.equipped);
        const activeTails = inventory.filter(i => i.type === 'tail' && i.equipped);
        
        if (item.equipped && item.type === 'sub' && activeEngines.length <= 1) return;
        if (item.equipped && item.type === 'tail' && activeTails.length <= 1) return;

        inventory.splice(idx, 1);
        selectedId = null;
        showToast("SCRAPPED ITEM");
        rebuildTrain();
        renderYard();
    }

    function rebuildTrain() {
        const engine = inventory.find(i => i.type === 'sub' && i.equipped);
        const tail = inventory.find(i => i.type === 'tail' && i.equipped);
        const coaches = inventory.filter(i => i.type === 'coach' && i.equipped);

        activeEngine = engine ? {...engine} : { type:'sub', subType:'steam', lvl: 1, color: '#9e2a2b' };
        activeTail = tail ? {...tail} : { type:'tail', subType:'basic', lvl: 1, color: '#e09f3e' };
        
        const oldCoaches = [...activeCoaches];
        activeCoaches = coaches.slice(0, 10).map((c) => {
            const match = oldCoaches.find(oc => oc.id === c.id);
            return { ...c, pass: match ? match.pass : 0, stock: match ? match.stock : 0 };
        });
        updateUI();
    }

    function getCap(c) {
        let base = c.lvl * 6;
        if (c.subType === 'ruby') base = c.lvl * 8;
        return base;
    }

    function spawnStation() {
        stations.push({ 
            x: worldX + w + 100, 
            y: 150 + Math.random()*(h-300), 
            type: Math.random() > 0.4 ? 'STATION' : 'HUB', 
            col: false 
        });
    }

    canvas.addEventListener('pointerdown', e => {
        if (state !== 'PLAY') return;
        targetY = e.clientY;

        // Vending Machine Collection
        let trainFullWidth = 150 + (activeCoaches.length * 85) + 60;
        let startX = (w / 2) - (trainFullWidth / 2);
        let currentXPos = startX + 50; 

        for (let i = 0; i < activeCoaches.length; i++) {
            const c = activeCoaches[i];
            currentXPos += 85; 
            if (c.subType === 'vend') {
                const dist = Math.hypot(e.clientX - currentXPos, e.clientY - trainY);
                if (dist < 45 && c.stock >= 100) {
                    const gain = 75 * c.lvl;
                    gold += gain;
                    c.stock = 0;
                    floatingTexts.push({ x: e.clientX, y: e.clientY, text: `+$${gain}`, life: 1 });
                    updateUI();
                }
            }
        }
    });

    function update() {
        if (state !== 'PLAY') return;
        const baseSpeed = activeEngine.subType === 'bullet' ? 7.5 : 4.5;
        const speed = baseSpeed + (activeEngine.lvl * 0.4);
        worldX += speed;
        trainY += (targetY - trainY) * 0.08;

        if (Math.random() < 0.012) spawnStation();

        let trainFullWidth = 150 + (activeCoaches.length * 85) + 60;
        let startX = (w / 2) - (trainFullWidth / 2);
        let engineVisualX = startX + (activeCoaches.length * 85) + 100;
        let engineWorldX = worldX + engineVisualX;

        stations.forEach(s => {
            if (!s.col && Math.abs(s.x - engineWorldX) < 90 && Math.abs(s.y - trainY) < 100) {
                s.col = true;
                if (s.type === 'STATION') {
                    activeCoaches.forEach(c => {
                        let space = getCap(c) - (c.pass || 0);
                        if (space > 0) {
                            let gain = Math.min(space, 1 + Math.floor(Math.random() * 3));
                            c.pass = (c.pass || 0) + gain;
                        }
                    });
                } else if (s.type === 'HUB') {
                    activeCoaches.forEach(c => {
                        let mult = c.subType === 'ruby' ? 2.5 : 1;
                        gold += (c.pass || 0) * (100 + (c.lvl * 25)) * mult;
                        c.pass = 0;
                    });
                }
                updateUI();
            }
        });

        activeCoaches.forEach(c => {
            if (c.subType === 'vend') {
                if ((c.pass || 0) > 0 && c.stock < 100) {
                    c.stock += (0.025 + (c.lvl * 0.01));
                    if (c.stock > 100) c.stock = 100;
                }
            }
        });

        stations = stations.filter(s => s.x > worldX - 1000);
        floatingTexts.forEach(t => t.life -= 0.02);
        floatingTexts = floatingTexts.filter(t => t.life > 0);
    }

    function drawTrainPart(x, y, type, lvl, pCount = 0, color, subType, stock = 0) {
        ctx.save();
        ctx.translate(x, y);
        ctx.lineWidth = 3; ctx.strokeStyle = "white";

        if (type === 'sub') {
            ctx.fillStyle = color;
            if (subType === 'bullet') {
                ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(80, -25); 
                ctx.quadraticCurveTo(110, 0, 80, 25); ctx.lineTo(0, 25); ctx.closePath();
                ctx.fill(); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.roundRect(0, -30, 100, 60, [0, 15, 15, 0]); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#333"; ctx.fillRect(70, -45, 15, 20);
            }
        } else if (type === 'coach') {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.roundRect(-40, -25, 80, 50, 8); ctx.fill(); ctx.stroke();
            if (subType === 'ruby') {
                ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(8, -14); ctx.lineTo(0, -6); ctx.lineTo(-8, -14); ctx.fill();
            } else if (subType === 'vend') {
                ctx.fillStyle = "#ffb703"; ctx.fillRect(-15, -15, 30, 30);
                ctx.fillStyle = "black"; ctx.font = "14px Arial"; ctx.textAlign = "center"; ctx.fillText("🥤", 0, 5);
                ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(-20, 28, 40, 6);
                ctx.fillStyle = stock >= 100 ? "#ffb703" : "#00f5d4"; ctx.fillRect(-20, 28, 40 * (stock/100), 6);
            }
            const capacity = getCap({lvl, subType});
            const visualCap = Math.min(capacity, 12);
            const cols = 3; const rows = Math.ceil(visualCap / cols);
            for(let i=0; i<visualCap; i++) {
                ctx.fillStyle = "rgba(255,255,255,0.4)";
                const r = i % rows; const c = Math.floor(i / rows);
                const wx = -30 + (c * 24); const wy = -18 + (r * 12);
                ctx.beginPath(); ctx.roundRect(wx, wy, 8, 8, 2); ctx.fill();
                if (i < pCount) { ctx.fillStyle="#111"; ctx.font="8px Arial"; ctx.textAlign = "center"; ctx.fillText("👤", wx + 4, wy + 7); }
            }
        } else {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.roundRect(-50, -30, 90, 60, [10, 0, 0, 10]); ctx.fill(); ctx.stroke();
        }
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        bubbles.forEach(b => {
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            b.y -= b.s; if (b.y < -20) b.y = h + 20;
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
        });

        if (state === 'START') return;

        ctx.save(); ctx.translate(-worldX, 0);
        stations.forEach(s => {
            ctx.fillStyle = s.type === 'HUB' ? "#ef476f" : "#ffb703";
            ctx.beginPath(); ctx.roundRect(s.x, s.y - 60, 110, 110, 15); ctx.fill();
            ctx.fillStyle = "white"; ctx.font = "bold 14px sans-serif"; ctx.textAlign="center";
            ctx.fillText(s.type === 'HUB' ? 'GRAND HUB' : 'STATION', s.x + 55, s.y + 15);
            ctx.font = "34px Arial"; ctx.fillText(s.type === 'HUB' ? '🏦' : '🚉', s.x + 55, s.y - 10);
        });
        ctx.restore();

        let trainFullWidth = 150 + (activeCoaches.length * 85) + 60;
        let startX = (w / 2) - (trainFullWidth / 2);
        let curX = startX + 50; 
        drawTrainPart(curX, trainY, 'tail', activeTail.lvl, 0, activeTail.color, activeTail.subType);
        activeCoaches.forEach(c => {
            ctx.strokeStyle = "#222"; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.moveTo(curX + 40, trainY); ctx.lineTo(curX + 60, trainY); ctx.stroke();
            curX += 85; drawTrainPart(curX, trainY, 'coach', c.lvl, c.pass, c.color, c.subType, c.stock);
        });
        ctx.strokeStyle = "#222"; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(curX + 40, trainY); ctx.lineTo(curX + 60, trainY); ctx.stroke();
        curX += 60; drawTrainPart(curX, trainY, 'sub', activeEngine.lvl, 0, activeEngine.color, activeEngine.subType);

        floatingTexts.forEach(t => {
            ctx.fillStyle = `rgba(255, 255, 255, ${t.life})`;
            ctx.font = "bold 22px sans-serif"; ctx.fillText(t.text, t.x, t.y - (1 - t.life) * 60);
        });
    }

    function frame() { update(); draw(); requestAnimationFrame(frame); }
    window.addEventListener('resize', resize);
    resize(); rebuildTrain(); frame();
</script>
