<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sub-Train: Deep Sea Adventure</title>
    <style>
        :root {
            --water: #00b4d8;
            --deep: #011627;
            --gold: #ffb703;
            --brass: #e09f3e;
            --punch: #ef476f;
            --ui-bg: rgba(1, 22, 39, 0.92);
            --bubble: rgba(255, 255, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--deep);
            font-family: 'Fredoka One', 'Segoe UI', cursive, sans-serif;
            user-select: none;
            color: white;
        }

        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; touch-action: none; background: linear-gradient(to bottom, #48cae4, #023e8a); }

        /* Fancy Startup Screen */
        #start-screen {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, #00b4d8 0%, #0077b6 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
            overflow: hidden;
        }

        .splash-bubble {
            position: absolute; background: var(--bubble);
            border-radius: 50%; pointer-events: none;
            animation: floatUp var(--d) linear infinite;
            bottom: -50px;
        }

        @keyframes floatUp {
            from { transform: translateY(0) translateX(0); opacity: 0.8; }
            to { transform: translateY(-120vh) translateX(var(--x)); opacity: 0; }
        }

        .logo-container {
            position: relative;
            animation: bounce 3s ease-in-out infinite;
            text-align: center;
            margin-bottom: 40px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .logo-text {
            font-size: 5rem;
            margin: 0;
            background: linear-gradient(to bottom, #ffeb3b, #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 0px rgba(0,0,0,0.2));
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .sub-caption {
            font-size: 1.5rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-top: -10px;
        }

        #start-btn {
            padding: 20px 60px;
            font-size: 2rem;
            background: #ff477e;
            color: white;
            border: 6px solid white;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 0 #c9184a;
            transition: all 0.1s;
            position: relative;
            z-index: 2001;
        }

        #start-btn:hover { transform: scale(1.05); }
        #start-btn:active { transform: translateY(6px); box-shadow: 0 4px 0 #c9184a; }

        /* Game UI */
        .hud {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 100;
        }

        .pill {
            background: var(--ui-bg); border: 3px solid white;
            padding: 10px 16px; border-radius: 20px; color: white;
            font-weight: bold; display: flex; align-items: center; gap: 8px;
            pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 16px;
        }

        .controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; pointer-events: auto; z-index: 100;
        }

        .btn-circle {
            width: 85px; height: 85px; background: #ffb703;
            border: 5px solid white; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 6px 0 #e6a700;
            font-size: 24px; transition: transform 0.1s; color: #333;
        }
        .btn-circle:active { transform: translateY(3px); box-shadow: 0 3px 0 #e6a700; }
        .btn-circle span { font-size: 11px; font-weight: 900; margin-top: 2px; text-transform: uppercase; }

        .modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #023e8a; border: 6px solid white; width: 92%; max-width: 450px;
            padding: 25px; border-radius: 30px; display: none; flex-direction: column;
            pointer-events: auto; z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .scroll-list { max-height: 50vh; overflow-y: auto; margin: 15px 0; padding-right: 10px; }
        .shop-section-title { color: #ffeb3b; font-size: 1rem; text-transform: uppercase; margin: 20px 0 8px 0; letter-spacing: 1px; border-bottom: 3px solid rgba(255,255,255,0.2); font-weight: 900; }
        
        .item-row {
            background: rgba(255,255,255,0.1); border-radius: 18px; padding: 15px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .merge-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            background: rgba(0,0,0,0.2); padding: 12px; border-radius: 20px;
        }
        
        .slot {
            aspect-ratio: 1; background: rgba(255,255,255,0.15); border-radius: 15px;
            border: 3px dashed rgba(255,255,255,0.3); display: flex; align-items: center;
            justify-content: center; font-size: 30px; position: relative;
        }
        .slot.filled { border-style: solid; background: white; border-color: #ffb703; }
        .slot.selected { border-color: #ff477e; background: #ffe5ec; transform: scale(1.05); }
        .status-dot { position: absolute; top: 5px; right: 5px; width: 12px; height: 12px; border-radius: 50%; background: #06d6a0; opacity: 0; border: 2px solid white; }
        .status-dot.on { opacity: 1; box-shadow: 0 0 8px #06d6a0; }
        .lvl-tag { position: absolute; bottom: 4px; left: 4px; font-size: 10px; background: #ff477e; color: white; padding: 2px 5px; border-radius: 5px; font-weight: bold; }

        #buy-notification {
            position: absolute; top: 25%; left: 50%; transform: translateX(-50%);
            background: #ffeb3b; color: #333; padding: 15px 30px; border-radius: 30px;
            font-weight: bold; z-index: 2000; display: none; pointer-events: none;
            border: 4px solid white; font-size: 1.2rem;
            animation: popUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popUp {
            0% { transform: translate(-50%, 40px) scale(0.5); opacity: 0; }
            30% { transform: translate(-50%, -20px) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -60px) scale(1); opacity: 0; }
        }

        button.close-btn { background: #ff477e; border: none; padding: 15px; border-radius: 15px; color: white; font-weight: bold; margin-top: 10px; cursor: pointer; border-bottom: 4px solid #c9184a; }
        button.close-btn:active { transform: translateY(2px); border-bottom: 2px solid #c9184a; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Fancier Kid-Friendly Start Screen -->
    <div id="start-screen">
        <!-- Bubbles will be injected here via JS -->
        <div class="logo-container">
            <h1 class="logo-text">Sub-Train</h1>
            <div class="sub-caption">Deep Sea Adventure! 🌊</div>
        </div>
        <button id="start-btn">LOADING...</button>
        <p style="margin-top: 20px; font-weight: bold; color: rgba(255,255,255,0.7);">Tap to steer your train!</p>
    </div>

    <div id="buy-notification">GREAT CHOICE! 🚢</div>

    <canvas id="gameCanvas"></canvas>

    <div class="hud">
        <div style="display:flex; flex-direction:column; gap:8px;">
            <div class="pill">💰 <span id="gold-val">0</span></div>
        </div>
        <div style="display:flex; flex-direction:column; gap:8px; align-items: flex-end;">
            <div class="pill">👥 <span id="pass-val">0</span> / <span id="max-pass-val">0</span></div>
            <div class="pill">⚙️ <span id="train-len">0</span> / 12</div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-circle" onclick="openShop()">🛒<span>SHOP</span></div>
        <div class="btn-circle" onclick="openMerge()">🏗️<span>YARD</span></div>
    </div>

    <!-- Shop -->
    <div id="shop-modal" class="modal">
        <h2 style="text-align:center; color:#ffeb3b; margin-top:0; font-size: 2rem;">Big Shop!</h2>
        <div class="scroll-list" id="shop-list"></div>
        <button class="close-btn" onclick="closeModals()">GO BACK!</button>
    </div>

    <!-- Yard -->
    <div id="merge-modal" class="modal">
        <h2 style="text-align:center; color:#ffeb3b; margin-top:0; font-size: 2rem;">My Fleet</h2>
        <div class="scroll-list">
            <p class="shop-section-title">Engines</p>
            <div class="merge-grid" id="engine-grid"></div>
            <p class="shop-section-title">Cars</p>
            <div class="merge-grid" id="coach-grid"></div>
            <p class="shop-section-title">Cabooses</p>
            <div class="merge-grid" id="tail-grid"></div>
        </div>
        <div id="yard-controls" style="display:none; margin-top: 10px; gap: 10px;">
            <button id="toggle-btn" onclick="toggleEquip()" style="flex:2; background:#ffeb3b; border:none; padding:15px; border-radius:15px; font-weight:bold; font-size: 1.1rem; border-bottom: 4px solid #c9a000;">USE IT!</button>
            <button onclick="scrapItem()" style="flex:1; background:#ff477e; border:none; padding:15px; border-radius:15px; color:white; font-weight:bold; border-bottom: 4px solid #c9184a;">BYE BYE</button>
        </div>
        <button class="close-btn" style="background:#48cae4; border-bottom-color:#0096c7;" onclick="closeModals()">BACK TO OCEAN</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'sub-train-adventure-v5';

    // Inject startup bubbles
    const startScreen = document.getElementById('start-screen');
    for (let i = 0; i < 15; i++) {
        const b = document.createElement('div');
        b.className = 'splash-bubble';
        const size = 20 + Math.random() * 60;
        b.style.width = size + 'px';
        b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + '%';
        b.style.setProperty('--d', (4 + Math.random() * 6) + 's');
        b.style.setProperty('--x', (Math.random() * 200 - 100) + 'px');
        b.style.animationDelay = Math.random() * 5 + 's';
        startScreen.appendChild(b);
    }

    let gold = 500;
    let inventory = [
        { id: 'start-e', type: 'sub', subType: 'steam', lvl: 1, icon: '🚢', color: '#ff4d6d', equipped: true },
        { id: 'start-c', type: 'coach', subType: 'std', lvl: 1, icon: '🛥️', color: '#00b4d8', equipped: true },
        { id: 'start-t', type: 'tail', subType: 'base', lvl: 1, icon: '🏗️', color: '#ffb703', equipped: true }
    ];
    let user = null;
    let state = 'START';
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let w, h;
    let worldX = 0;
    let trainY = 0, targetY = 0;
    let stations = [];
    let speedLines = [];
    let bubbles = [];
    let activeSub = null, activeTail = null, activeCoaches = [];
    let selectedId = null;

    const SHOP_DATA = {
        sub: [
            { id: 's_sub', name: 'Fast Engine', cost: 1000, subType: 'steam', icon: '🚢', color: '#ff4d6d', desc: 'Zoooom!' },
            { id: 's_nuclear', name: 'Super Reactor', cost: 5000, subType: 'nuke', icon: '⚛️', color: '#72efdd', desc: 'Crazy Fast!' }
        ],
        coach: [
            { id: 's_std', name: 'Blue Car', cost: 200, subType: 'std', icon: '🛥️', color: '#00b4d8', desc: 'Carries Friends' },
            { id: 's_vending', name: 'Snack Car', cost: 800, subType: 'vending', icon: '🥤', color: '#ff758f', desc: 'Makes 💰 while moving' },
            { id: 's_luxury', name: 'Shiny Car', cost: 2500, subType: 'lux', icon: '💎', color: '#ffb703', desc: 'Fancy Friends!' }
        ],
        tail: [
            { id: 's_tail', name: 'Tail Fin', cost: 300, subType: 'base', icon: '🏗️', color: '#ffb703', desc: 'Keeps it steady' },
            { id: 's_heavy', name: 'Super Tail', cost: 1200, subType: 'turbo', icon: '⚙️', color: '#590d22', desc: 'Looks so cool!' }
        ]
    };

    async function saveGame() {
        if (!user) return;
        const ref = doc(db, 'artifacts', appId, 'users', user.uid, 'save', 'data');
        await setDoc(ref, { gold, inventory: JSON.stringify(inventory), ts: Date.now() });
    }

    async function loadGame() {
        const ref = doc(db, 'artifacts', appId, 'users', user.uid, 'save', 'data');
        const snap = await getDoc(ref);
        if (snap.exists()) {
            const d = snap.data();
            gold = d.gold || 500;
            inventory = JSON.parse(d.inventory);
            rebuildTrain();
            updateUI();
        }
    }

    (async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    })();

    onAuthStateChanged(auth, u => {
        if (u) {
            user = u;
            loadGame().then(() => {
                const b = document.getElementById('start-btn');
                b.innerText = "PLAY NOW!";
                b.onclick = () => {
                    startScreen.style.opacity = '0';
                    startScreen.style.transition = 'opacity 0.5s';
                    setTimeout(() => startScreen.style.display = 'none', 500);
                    state = 'PLAY';
                };
            });
        }
    });

    function updateUI() {
        document.getElementById('gold-val').innerText = Math.floor(gold);
        const pCount = activeCoaches.reduce((a, b) => a + (b.passengers || 0), 0);
        const maxP = activeCoaches.filter(c => c.subType !== 'vending').length * 6;
        document.getElementById('pass-val').innerText = pCount;
        document.getElementById('max-pass-val').innerText = maxP;
        document.getElementById('train-len').innerText = activeCoaches.length;
    }

    function rebuildTrain() {
        activeSub = inventory.find(i => i.type === 'sub' && i.equipped) || inventory.find(i => i.type === 'sub') || null;
        activeTail = inventory.find(i => i.type === 'tail' && i.equipped) || inventory.find(i => i.type === 'tail') || null;
        activeCoaches = inventory.filter(i => i.type === 'coach' && i.equipped).map(c => ({
            ...c, 
            passengers: 0, 
            vendingProgress: 0 
        }));
        updateUI();
    }

    window.openShop = () => {
        state = 'PAUSE';
        const list = document.getElementById('shop-list');
        list.innerHTML = '';
        
        ['sub', 'coach', 'tail'].forEach(cat => {
            const title = cat === 'sub' ? 'Better Engines' : cat === 'coach' ? 'Cooler Cars' : 'Stronger Tails';
            list.innerHTML += `<div class="shop-section-title">${title}</div>`;
            SHOP_DATA[cat].forEach(item => {
                const canAfford = gold >= item.cost;
                list.innerHTML += `
                    <div class="item-row">
                        <div style="font-size: 30px; margin-right: 15px;">${item.icon}</div>
                        <div style="flex:1"><b>${item.name}</b><br><small style="opacity:0.8">${item.desc}</small></div>
                        <button onclick="buy('${cat}', '${item.id}')" ${!canAfford?'disabled':''} 
                                style="background:${canAfford?'#ffb703':'#888'}; border:none; padding:10px 15px; border-radius:12px; font-weight:bold; min-width:90px; border-bottom: 4px solid ${canAfford?'#e6a700':'#444'};">
                            💰${item.cost}
                        </button>
                    </div>
                `;
            });
        });
        document.getElementById('shop-modal').style.display = 'flex';
    };

    window.buy = (cat, id) => {
        const item = SHOP_DATA[cat].find(i => i.id === id);
        if (gold >= item.cost) {
            gold -= item.cost;
            inventory.push({ 
                id: Math.random().toString(36).substr(2, 9), 
                type: cat, 
                subType: item.subType, 
                lvl: 1, 
                icon: item.icon, 
                color: item.color, 
                equipped: false 
            });
            
            const notify = document.getElementById('buy-notification');
            notify.style.display = 'block';
            setTimeout(() => notify.style.display = 'none', 1000);
            
            saveGame(); updateUI(); openShop();
        }
    };

    window.openMerge = () => {
        state = 'PAUSE'; selectedId = null;
        renderYard();
        document.getElementById('merge-modal').style.display = 'flex';
    };

    function renderYard() {
        const renderGrid = (gid, type) => {
            const g = document.getElementById(gid); g.innerHTML = '';
            const items = inventory.filter(i => i.type === type);
            items.forEach(item => {
                const d = document.createElement('div');
                d.className = `slot filled ${selectedId === item.id ? 'selected' : ''}`;
                d.onclick = () => selectItem(item.id);
                d.innerHTML = `${item.icon}<span class="lvl-tag">L${item.lvl}</span><div class="status-dot ${item.equipped?'on':''}"></div>`;
                g.appendChild(d);
            });
            for(let i=items.length; i<4; i++) {
                const d = document.createElement('div'); d.className = 'slot'; g.appendChild(d);
            }
        };
        renderGrid('engine-grid', 'sub');
        renderGrid('coach-grid', 'coach');
        renderGrid('tail-grid', 'tail');
        
        const controls = document.getElementById('yard-controls');
        if (selectedId) {
            controls.style.display = 'flex';
            const item = inventory.find(i => i.id === selectedId);
            document.getElementById('toggle-btn').innerText = item.equipped ? "PUT AWAY" : "USE IT!";
        } else { controls.style.display = 'none'; }
    }

    function selectItem(id) {
        if (selectedId === id) { selectedId = null; }
        else if (selectedId) {
            const a = inventory.find(i => i.id === selectedId);
            const b = inventory.find(i => i.id === id);
            if (a && b && a.type === b.type && a.subType === b.subType && a.lvl === b.lvl && a.id !== b.id) {
                b.lvl++;
                inventory = inventory.filter(i => i.id !== selectedId);
                selectedId = null;
                rebuildTrain();
            } else { selectedId = id; }
        } else { selectedId = id; }
        renderYard();
    }

    window.toggleEquip = () => {
        const item = inventory.find(i => i.id === selectedId);
        if (item.equipped) { item.equipped = false; }
        else {
            if (item.type === 'sub' || item.type === 'tail') {
                inventory.filter(i => i.type === item.type).forEach(i => i.equipped = false);
            }
            if (item.type === 'coach' && inventory.filter(i => i.type === 'coach' && i.equipped).length >= 12) return;
            item.equipped = true;
        }
        rebuildTrain(); renderYard(); saveGame();
    };

    window.scrapItem = () => {
        inventory = inventory.filter(i => i.id !== selectedId);
        selectedId = null; rebuildTrain(); renderYard(); saveGame();
    };

    window.closeModals = () => {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        state = 'PLAY';
    };

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        trainY = targetY = h / 2;
        bubbles = Array.from({length: 30}, () => ({x: Math.random()*w, y: Math.random()*h, r: Math.random()*6, s: Math.random()*2+1}));
        speedLines = Array.from({length: 15}, () => ({x: Math.random()*w, y: Math.random()*h, l: 30 + Math.random()*50, s: 10 + Math.random()*15}));
    }

    canvas.addEventListener('pointerdown', e => { if (state === 'PLAY') targetY = e.clientY; });
    canvas.addEventListener('pointermove', e => { if (state === 'PLAY') targetY = e.clientY; });

    function update() {
        if (state !== 'PLAY' || !activeSub) return;

        const subLvl = activeSub.lvl || 1;
        const speed = 5 + (subLvl * 0.8);
        worldX += speed;
        trainY += (targetY - trainY) * 0.08;

        // Vending
        activeCoaches.forEach(c => {
            if (c.subType === 'vending') {
                const fillRate = 0.005 + (c.lvl * 0.004);
                c.vendingProgress += fillRate;
                if (c.vendingProgress >= 1) {
                    c.vendingProgress = 0;
                    gold += 10 * c.lvl;
                    updateUI();
                }
            }
        });

        const passCars = activeCoaches.filter(c => c.subType !== 'vending');
        const pCount = passCars.reduce((a, b) => a + (b.passengers || 0), 0);
        const maxP = passCars.length * 6;
        const spawnChance = pCount > (maxP * 0.75) ? 0.01 : 0.03;

        if (Math.random() < spawnChance) {
            stations.push({
                x: worldX + w + 100,
                y: 100 + Math.random()*(h-200),
                type: pCount > (maxP * 0.6) ? 'HUB' : 'STATION',
                hit: false
            });
        }

        const trainW = 100 + (activeCoaches.length * 80);
        const tx = (w/2) - (trainW/2);

        stations.forEach(s => {
            const sx = s.x - worldX;
            if (!s.hit && sx > tx && sx < tx + trainW && Math.abs(s.y - trainY) < 60) {
                s.hit = true;
                if (s.type === 'STATION') {
                    passCars.forEach(c => { if(c.passengers < 6) c.passengers++; });
                } else {
                    passCars.forEach(c => {
                        const multiplier = c.subType === 'lux' ? 2 : 1;
                        gold += (c.passengers * 60) * multiplier;
                        c.passengers = 0;
                    });
                    saveGame();
                }
                updateUI();
            }
        });

        stations = stations.filter(s => s.x > worldX - 500);
        speedLines.forEach(l => {
            l.x -= l.s;
            if (l.x < -100) { l.x = w + 100; l.y = Math.random()*h; }
        });
        bubbles.forEach(b => {
            b.y -= b.s;
            if (b.y < -20) b.y = h + 20;
        });
    }

    function drawPart(x, y, part, pass = 0, progress = 0) {
        if (!part) return;
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = part.color;
        ctx.strokeStyle = "white";
        ctx.lineWidth = 4;

        const lvl = part.lvl || 1;

        if (part.type === 'sub') {
            ctx.beginPath();
            ctx.ellipse(30, 0, 50, 30, 0, 0, Math.PI*2);
            ctx.fill(); ctx.stroke();
            // Fin
            ctx.beginPath(); ctx.moveTo(10, -25); ctx.lineTo(-10, -45); ctx.lineTo(-10, -25); ctx.closePath(); ctx.fill(); ctx.stroke();
            // Detail
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.beginPath(); ctx.arc(45, -5, 10, 0, 7); ctx.fill();
        } else if (part.type === 'coach') {
            ctx.beginPath();
            ctx.roundRect(-35, -25, 70, 50, 15);
            ctx.fill(); ctx.stroke();
            
            if (part.subType === 'vending') {
                ctx.fillStyle = "rgba(0,0,0,0.3)";
                ctx.fillRect(-20, -5, 40, 12);
                ctx.fillStyle = "#ffeb3b";
                ctx.fillRect(-20, -5, 40 * progress, 12);
                ctx.font = "18px Arial";
                ctx.fillText("🥤", -10, 25);
            } else {
                for(let i=0; i<6; i++) {
                    ctx.fillStyle = i < pass ? "#ffeb3b" : "rgba(0,0,0,0.2)";
                    const row = i < 3 ? -8 : 8;
                    const col = (i % 3) * 18 - 18;
                    ctx.beginPath(); ctx.arc(col, row, 6, 0, 7); ctx.fill();
                }
            }
        } else {
            ctx.beginPath();
            ctx.moveTo(35, -25);
            ctx.lineTo(-10, -25);
            ctx.quadraticCurveTo(-45, 0, -10, 25);
            ctx.lineTo(35, 25);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            ctx.fillStyle = "white";
            for(let i=0; i<lvl; i++) {
                const spread = 40;
                const step = spread / (lvl === 1 ? 1 : lvl - 1);
                const py = lvl === 1 ? 0 : -20 + (i * step);
                ctx.beginPath();
                ctx.moveTo(-45, py);
                ctx.lineTo(-30, py - 8);
                ctx.lineTo(-30, py + 8);
                ctx.closePath();
                ctx.fill();
            }
        }
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);

        speedLines.forEach(l => {
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x + l.l, l.y); ctx.stroke();
        });

        bubbles.forEach(b => {
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
        });

        if (state === 'START' || !activeSub) return;

        ctx.save(); ctx.translate(-worldX, 0);
        stations.forEach(s => {
            ctx.shadowBlur = 20;
            ctx.shadowColor = s.type === 'HUB' ? '#ff477e' : '#ffeb3b';
            ctx.fillStyle = s.type === 'HUB' ? '#ff477e' : '#ffeb3b';
            ctx.beginPath(); ctx.roundRect(s.x, s.y - 40, 80, 80, 20); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = s.type === 'HUB' ? "white" : "#333"; 
            ctx.font = "bold 14px sans-serif"; ctx.textAlign="center";
            ctx.fillText(s.type === 'HUB' ? "DROP OFF" : "FRIENDS!", s.x+40, s.y+5);
        });
        ctx.restore();

        const trainW = 100 + (activeCoaches.length * 80);
        let cx = (w/2) - (trainW/2) + 20;

        if (activeTail) drawPart(cx, trainY, activeTail);
        activeCoaches.forEach(c => {
            cx += 80;
            ctx.strokeStyle = "white"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(cx-45, trainY); ctx.lineTo(cx-35, trainY); ctx.stroke();
            drawPart(cx, trainY, c, c.passengers || 0, c.vendingProgress || 0);
        });
        cx += 75;
        ctx.strokeStyle = "white"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(cx-40, trainY); ctx.lineTo(cx-20, trainY); ctx.stroke();
        drawPart(cx, trainY, activeSub);
    }

    function loop() { 
        update(); 
        draw(); 
        requestAnimationFrame(loop); 
    }
    
    window.addEventListener('resize', resize);
    resize();
    rebuildTrain();
    loop();
</script>
</body>
